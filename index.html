<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CNC Tool Database Viewer</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: Arial, sans-serif; margin: 20px; background: #f9f9f9; color: #222; }
    h1 { color: #333; }
    h2 { color: #555; margin-top: 30px; border-bottom: 2px solid #ddd; padding-bottom: 6px; }
    input { margin-bottom: 20px; padding: 10px; width: 400px; font-size: 16px; border: 1px solid #ccc; border-radius: 4px; }
    table { border-collapse: collapse; width: 100%; margin-bottom: 30px; background: #fff; }
    th, td { border: 1px solid #ddd; padding: 8px 10px; text-align: left; vertical-align: top; }
    th { background-color: #f0f0f0; cursor: pointer; user-select: none; white-space: nowrap; }
    th:hover { background-color: #e0e0e0; }
    tr.data-row:hover td { background: #f5f5ff; }
    pre { background: #f0f0f0; padding: 12px; overflow: auto; font-size: 12px; border-radius: 4px; max-height: 400px; }
    button { padding: 4px 12px; cursor: pointer; border: 1px solid #aaa; border-radius: 3px; background: #fff; }
    button:hover { background: #eee; }
    .tag { display: inline-block; background: #ddeeff; color: #336; border-radius: 3px; padding: 1px 6px; font-size: 11px; margin: 1px; }
    #status { color: #888; font-size: 13px; margin-bottom: 10px; }
    .error { color: red; font-weight: bold; }
  </style>
</head>
<body>
  <h1>CNC Tool Database</h1>
  <div id="status">Loading database...</div>
  <input type="text" id="search" placeholder="Search by any field..." oninput="filterTables()" />
  <div id="content"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.3/sql-wasm.min.js"></script>
  <script>
    let toolsData = {};

    async function loadData() {
      try {
        const [dbResponse] = await Promise.all([fetch('db.sqlite')]);
        if (!dbResponse.ok) throw new Error('Could not fetch db.sqlite - is the server running?');
        const buffer = await dbResponse.arrayBuffer();

        const SQL = await initSqlJs({
          locateFile: file => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.3/${file}`
        });

        const db = new SQL.Database(new Uint8Array(buffer));

        const loadTable = (name) => {
          const res = db.exec(`SELECT * FROM ${name}`);
          if (!res.length) return [];
          const { columns, values } = res[0];
          return values.map(row => {
            const obj = {};
            columns.forEach((col, i) => {
              let val = row[i];
              if (val && ['specs','compatible_machines','compatible_holders','compatible_inserts','sources','tags','applications'].includes(col)) {
                try { val = JSON.parse(val); } catch {}
              }
              obj[col] = val;
            });
            return obj;
          });
        };

        toolsData.holders = loadTable('holders');
        toolsData.inserts = loadTable('inserts');
        db.close();

        const total = Object.values(toolsData).reduce((s, v) => s + v.length, 0);
        document.getElementById('status').textContent =
          `Loaded ${total} tools — ${toolsData.holders.length} holders, ${toolsData.inserts.length} inserts`;
        renderTables();

      } catch (err) {
        document.getElementById('status').innerHTML =
          `<span class="error">Error: ${err.message}<br>Start the server: open a terminal in the cnc-tool-database folder and run <code>node server.js</code>, then go to <a href="http://127.0.0.1:8080">http://127.0.0.1:8080</a></span>`;
      }
    }

    function renderTables() {
      const content = document.getElementById('content');
      content.innerHTML = '';
      Object.entries(toolsData).forEach(([group, tools]) => {
        if (!tools.length) return;
        const heading = document.createElement('h2');
        heading.textContent = group.charAt(0).toUpperCase() + group.slice(1) + ` (${tools.length})`;
        content.appendChild(heading);

        const table = document.createElement('table');
        table.dataset.group = group;
        table.innerHTML = `<thead><tr>
          <th onclick="sortTable(this,0)">ID ↕</th>
          <th onclick="sortTable(this,1)">Type ↕</th>
          <th onclick="sortTable(this,2)">Manufacturer ↕</th>
          <th>Description</th>
          <th onclick="sortTable(this,4)">Size ↕</th>
          <th onclick="sortTable(this,5)">Price ↕</th>
          <th>Tags</th>
          <th>Details</th>
        </tr></thead><tbody></tbody>`;

        const tbody = table.querySelector('tbody');
        tools.forEach((tool, idx) => {
          const tags = Array.isArray(tool.tags) ? tool.tags : [];
          const tagsHtml = tags.map(t => `<span class="tag">${t}</span>`).join(' ');

          const dataRow = document.createElement('tr');
          dataRow.className = 'data-row';
          dataRow.innerHTML = `
            <td>${tool.json_id || tool.model || ''}</td>
            <td>${tool.type || ''}</td>
            <td>${tool.manufacturer || tool.brand || ''}</td>
            <td>${(tool.description || '').substring(0, 80)}${(tool.description || '').length > 80 ? '…' : ''}</td>
            <td>${tool.size || ''}</td>
            <td>${tool.price_range || ''}</td>
            <td>${tagsHtml}</td>
            <td><button onclick="toggleDetails('${group}',${idx})">Show</button></td>`;

          const detailsRow = document.createElement('tr');
          detailsRow.id = `details-${group}-${idx}`;
          detailsRow.style.display = 'none';
          detailsRow.innerHTML = `<td colspan="8"><pre>${JSON.stringify(tool, null, 2)}</pre></td>`;

          tbody.appendChild(dataRow);
          tbody.appendChild(detailsRow);
        });
        content.appendChild(table);
      });
    }

    function toggleDetails(group, idx) {
      const row = document.getElementById(`details-${group}-${idx}`);
      const btn = row.previousElementSibling.querySelector('button');
      const hidden = row.style.display === 'none';
      row.style.display = hidden ? '' : 'none';
      btn.textContent = hidden ? 'Hide' : 'Show';
    }

    function filterTables() {
      const filter = document.getElementById('search').value.toLowerCase();
      document.querySelectorAll('tbody').forEach(tbody => {
        const rows = Array.from(tbody.rows);
        for (let i = 0; i < rows.length; i += 2) {
          const match = !filter || rows[i].textContent.toLowerCase().includes(filter);
          rows[i].style.display = match ? '' : 'none';
          if (rows[i+1]) rows[i+1].style.display = (!match || rows[i+1].style.display === 'none') ? 'none' : '';
        }
      });
    }

    function sortTable(th, col) {
      const tbody = th.closest('table').querySelector('tbody');
      const rows = Array.from(tbody.rows);
      const pairs = [];
      for (let i = 0; i < rows.length; i += 2) pairs.push([rows[i], rows[i+1]]);
      const asc = th.dataset.sort !== 'asc';
      pairs.sort((a, b) => {
        const va = a[0].cells[col]?.textContent.trim() || '';
        const vb = b[0].cells[col]?.textContent.trim() || '';
        return asc ? va.localeCompare(vb, undefined, {numeric:true}) : vb.localeCompare(va, undefined, {numeric:true});
      });
      pairs.forEach(([r1,r2]) => { tbody.appendChild(r1); tbody.appendChild(r2); });
      th.dataset.sort = asc ? 'asc' : 'desc';
    }

    loadData();
  </script>
</body>
</html>
