        function renderTables() {
            Object.keys(data).forEach(group => {
                if (data[group].length === 0) return;
                const div = document.createElement('div');
                div.innerHTML = `<h2>${group.charAt(0).toUpperCase() + group.slice(1)}</h2>`;
                const table = document.createElement('table');
                table.innerHTML = `
                    <tr>
                        <th onclick="sortTable(this, 0)">ID</th>
                        <th onclick="sortTable(this, 1)">Type</th>
                        <th onclick="sortTable(this, 2)">Manufacturer</th>
                        <th>Description</th>
                        <th onclick="sortTable(this, 4)">Size</th>
                        <th onclick="sortTable(this, 5)">Price Range</th>
                        <th>Tags</th>
                        <th>Details</th>
                    </tr>
                `;
                data[group].forEach(tool => {
                    const row = table.insertRow();
                    row.insertCell().textContent = tool.id;
                    row.insertCell().textContent = tool.type;
                    row.insertCell().textContent = tool.manufacturer;
                    row.insertCell().textContent = tool.description.substring(0, 50) + '...';
                    row.insertCell().textContent = tool.size;
                    row.insertCell().textContent = tool.price_range;
                    row.insertCell().textContent = tool.tags.join(', ');
                    const detailsCell = row.insertCell();
                    detailsCell.innerHTML = '<button onclick="toggleDetails(this)">Show</button>';
                    const detailsRow = table.insertRow();
                    detailsRow.className = 'details';
                    const detailsContent = detailsRow.insertCell();
                    detailsContent.colSpan = 8;
                    detailsContent.innerHTML = `<pre>${JSON.stringify(tool, null, 2)}</pre>`;
                });
                div.appendChild(table);
                document.body.appendChild(div);
            });
        }
        function filterTables() {
            const filter = document.getElementById('search').value.toLowerCase();
            const tables = document.querySelectorAll('table');
            tables.forEach(table => {
                const rows = table.rows;
                for (let i = 1; i < rows.length; i += 2) {
                    const cells = rows[i].cells;
                    let match = false;
                    for (let j = 0; j < cells.length; j++) {
                        if (cells[j].textContent.toLowerCase().includes(filter)) {
                            match = true;
                            break;
                        }
                    }
                    rows[i].style.display = match ? '' : 'none';
                    rows[i+1].style.display = match ? '' : 'none';
                }
            });
        }
        function toggleDetails(button) {
            const row = button.closest('tr').nextElementSibling;
            row.style.display = row.style.display === 'none' ? '' : 'none';
            button.textContent = row.style.display === 'none' ? 'Show' : 'Hide';
        }
        function sortTable(th, col) {
            const table = th.closest('table');
            const rows = Array.from(table.rows).slice(1);
            const isAsc = th.getAttribute('data-sort') !== 'asc';
            rows.sort((a, b) => {
                let valA = a.cells[col].textContent.trim();
                let valB = b.cells[col].textContent.trim();
                return isAsc ? valA.localeCompare(valB) : valB.localeCompare(valA);
            });
            rows.forEach(row => table.appendChild(row));
            th.setAttribute('data-sort', isAsc ? 'asc' : 'desc');
        }
        renderTables();
    </script>
