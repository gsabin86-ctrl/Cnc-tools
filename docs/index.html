<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEON FORGE // CNC TOOL DATABASE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&family=Share+Tech+Mono&display=swap');

        :root {
            --neon-cyan: #00f9ff;
            --neon-pink: #ff00aa;
            --neon-purple: #7b2cbf;
            --neon-green: #39ff14;
            --header-h: 56px;
            --sidebar-w: 240px;
            --search-bar-h: 38px;
            --ui-font-size: 12px;
        }

        * { box-sizing: border-box; }

        body {
            background: #050507;
            color: #e0e0ff;
            font-family: 'Share Tech Mono', monospace;
            background-image:
                linear-gradient(rgba(0,249,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,249,255,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            animation: grid-move 25s linear infinite;
            overflow: hidden;
            height: 100dvh;
            display: flex;
            flex-direction: column;
        }

        @keyframes grid-move {
            0% { background-position: 0 0; }
            100% { background-position: 40px 40px; }
        }

        @keyframes glitch {
            0%   { transform: translate(0); }
            20%  { transform: translate(-2px, 2px); }
            40%  { transform: translate(-2px, -2px); }
            60%  { transform: translate(2px, 2px); }
            80%  { transform: translate(2px, -2px); }
            100% { transform: translate(0); }
        }

        /* ── Header ── */
        #app-header {
            flex-shrink: 0;
            height: var(--header-h);
            min-height: 40px;
            max-height: 120px;
            background: linear-gradient(90deg, #0a0a0f 0%, #111118 100%);
            border-bottom: 1px solid #00f9ff;
            box-shadow: 0 0 20px rgba(0,249,255,0.3);
            display: flex;
            align-items: center;
            padding: 0 16px;
            gap: 12px;
            overflow: hidden;
            position: relative;
            z-index: 50;
            user-select: none;
        }

        #header-resize-handle {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 5px;
            cursor: ns-resize;
            background: transparent;
            transition: background 0.15s;
        }
        #header-resize-handle:hover,
        #header-resize-handle.dragging { background: rgba(0,249,255,0.35); }

        .header-logo {
            display: flex; align-items: center; gap: 8px; flex-shrink: 0;
        }
        .header-logo-icon {
            width: 36px; height: 36px;
            background: linear-gradient(135deg, #00f9ff, #7b2cbf, #ff00aa);
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .header-title {
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: clamp(13px, 2.5vw, 22px);
            letter-spacing: 2px;
            text-shadow: 0 0 10px #00f9ff, 0 0 20px #00f9ff;
            white-space: nowrap;
        }
        .header-sub {
            font-size: 10px; color: #00f9ff; letter-spacing: 2px;
            white-space: nowrap;
        }
        .header-stats {
            display: flex; align-items: center; gap: 8px;
            font-size: 11px; margin-left: auto; flex-shrink: 0;
        }
        .stat-pill {
            background: #111118;
            border: 1px solid #334155;
            border-radius: 999px;
            padding: 3px 10px;
            display: flex; align-items: center; gap: 6px;
            white-space: nowrap;
        }
        .unit-toggle {
            display: flex; align-items: center;
            background: #111118;
            border: 1px solid #334155;
            border-radius: 999px;
            padding: 3px;
            font-size: 11px; font-weight: 600;
        }
        .unit-toggle button {
            padding: 3px 10px; border-radius: 999px;
            transition: all 0.15s;
            white-space: nowrap;
        }
        .unit-toggle button.active {
            background: #00f9ff; color: #050507;
        }
        .unit-toggle button:not(.active) {
            color: #64748b;
        }
        .unit-toggle button:not(.active):hover { color: #fff; }

        /* ── Body area ── */
        #app-body {
            flex: 1;
            display: flex;
            overflow: hidden;
            position: relative;
        }

        /* ── Sidebar ── */
        #sidebar {
            width: var(--sidebar-w);
            min-width: 36px;
            max-width: 420px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            background: #0a0a0f;
            border-right: 1px solid #1e2030;
            position: relative;
            overflow: hidden;
            transition: width 0.2s ease;
        }
        #sidebar.collapsed { width: 36px !important; }

        #sidebar-resize-handle {
            position: absolute;
            top: 0; right: 0; bottom: 0;
            width: 5px;
            cursor: ew-resize;
            background: transparent;
            transition: background 0.15s;
            z-index: 10;
        }
        #sidebar-resize-handle:hover,
        #sidebar-resize-handle.dragging { background: rgba(0,249,255,0.35); }

        #sidebar-toggle {
            width: 36px; height: 36px; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            color: #00f9ff;
            border-bottom: 1px solid #1e2030;
            background: #0d0d12;
            transition: background 0.15s;
        }
        #sidebar-toggle:hover { background: #111118; }

        #sidebar-inner {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 12px 10px 16px 10px;
            min-width: 200px;
        }

        #sidebar.collapsed #sidebar-inner { display: none; }
        #sidebar.collapsed #sidebar-resize-handle { display: none; }

        .filter-group-title {
            color: #94a3b8; font-size: 10px; letter-spacing: 1px;
            display: flex; align-items: center; gap: 6px;
            margin-bottom: 6px; padding: 0 2px;
        }

        .filter-chip {
            background: #111118;
            border: 1px solid #334155;
            color: #94a3b8;
            transition: all 0.15s;
            font-size: calc(var(--ui-font-size, 12px) - 1px);
            padding: 3px 8px;
            border-radius: 999px;
            cursor: pointer;
            white-space: nowrap;
        }
        .filter-chip:hover {
            border-color: #00f9ff; color: #00f9ff;
            box-shadow: 0 0 6px rgba(0,249,255,0.3);
        }
        .filter-chip.active {
            background: #00f9ff; color: #050507;
            border-color: #00f9ff;
            box-shadow: 0 0 10px #00f9ff;
            font-weight: 600;
        }

        /* ── Main content ── */
        #main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-width: 0;
        }

        /* ── Search bar ── */
        #search-bar {
            flex-shrink: 0;
            padding: 8px 12px;
            background: #050507;
            border-bottom: 1px solid #1e2030;
            display: flex; align-items: center; gap: 8px;
        }
        .search-wrap {
            position: relative; flex: 1;
        }
        .search-wrap i {
            position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
            color: #00f9ff; font-size: 13px; pointer-events: none;
        }
        #search-input {
            width: 100%;
            background: #111118;
            border: 1px solid #334155;
            color: #e0e0ff;
            padding: 7px 12px 7px 34px;
            border-radius: 8px;
            font-family: 'Share Tech Mono', monospace;
            font-size: var(--ui-font-size, 12px);
            height: var(--search-bar-h, 38px);
            transition: all 0.15s;
        }
        #search-input:focus {
            border-color: #00f9ff;
            box-shadow: 0 0 12px rgba(0,249,255,0.25);
            outline: none;
        }
        #search-input::placeholder { color: #334155; }

        .results-count {
            font-size: 11px; color: #64748b; white-space: nowrap;
        }
        .results-count span { color: #00f9ff; font-size: 13px; }

        /* ── Table wrapper ── */
        #table-wrap {
            flex: 1;
            overflow: auto;
        }

        /* scrollbars */
        * { scrollbar-width: thin; scrollbar-color: #1a1a22 #050507; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #0a0a0f; }
        ::-webkit-scrollbar-thumb { background: #1a1a22; border: 1px solid #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #00f9ff; box-shadow: 0 0 6px rgba(0,249,255,0.5); }

        /* ── Table ── */
        #tool-table {
            width: 100%;
            border-collapse: collapse;
            font-size: var(--ui-font-size, 12px);
        }
        #tool-table thead th {
            background: #0d0d12;
            color: #00f9ff;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 8px 10px;
            text-align: left;
            border-bottom: 1px solid #334155;
            position: sticky; top: 0; z-index: 5;
            white-space: nowrap;
        }
        #tool-table thead th.center { text-align: center; }
        #tool-table tbody tr { border-bottom: 1px solid #1a1a22; transition: background 0.1s; }
        #tool-table tbody tr:hover { background: #0f0f14; }
        #tool-table tbody td { padding: 7px 10px; vertical-align: middle; }
        #tool-table tbody td.center { text-align: center; }

        .td-part { font-family: 'Share Tech Mono', monospace; color: #00f9ff; white-space: nowrap; }
        .td-maker span {
            background: #7b2cbf22; color: #a98ff5;
            border: 1px solid #7b2cbf44;
            border-radius: 4px; padding: 1px 6px; font-size: 11px;
        }
        .td-grade { color: #39ff14; font-family: 'Share Tech Mono', monospace; }
        .td-desc { color: #94a3b8; max-width: 260px; }

        /* type badge */
        .type-badge {
            font-size: 10px; border-radius: 4px; padding: 1px 5px;
            border: 1px solid; white-space: nowrap;
        }
        .type-insert  { color: #39ff14; background: rgba(57,255,20,.1);  border-color: rgba(57,255,20,.3); }
        .type-holder  { color: #ff9900; background: rgba(255,153,0,.1);  border-color: rgba(255,153,0,.3); }
        .type-module  { color: #d890ff; background: rgba(123,44,191,.1); border-color: rgba(123,44,191,.3); }
        .type-shank   { color: #fff890; background: rgba(255,248,144,.1);border-color: rgba(255,248,144,.3); }
        .type-machine { color: #90d8ff; background: rgba(144,216,255,.1);border-color: rgba(144,216,255,.3); }
        .type-default { color: #94a3b8; background: rgba(148,163,184,.1);border-color: rgba(148,163,184,.3); }

        /* details button */
        .btn-details {
            background: transparent;
            border: 1px solid #334155;
            color: #64748b;
            border-radius: 5px;
            padding: 3px 8px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 10px;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.15s;
            white-space: nowrap;
        }
        .btn-details:hover {
            border-color: #00f9ff; color: #00f9ff;
            box-shadow: 0 0 8px rgba(0,249,255,0.3);
        }
        .btn-details.open {
            background: #00f9ff; color: #050507;
            border-color: #00f9ff;
            box-shadow: 0 0 10px #00f9ff;
        }

        /* expanded detail row */
        .detail-row td {
            padding: 0 !important;
            background: #0d0d14;
            border-bottom: 1px solid #334155 !important;
        }
        .detail-panel {
            padding: 16px 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        @media (min-width: 640px) {
            .detail-panel { grid-template-columns: repeat(3, 1fr); }
        }
        @media (min-width: 900px) {
            .detail-panel { grid-template-columns: repeat(4, 1fr); }
        }
        .detail-panel-wide {
            grid-column: 1 / -1;
            background: #111118; border-radius: 8px; padding: 10px 14px;
            font-size: 12px; color: #c0c0dd; line-height: 1.6;
        }
        .detail-cell {
            background: #111118; border-radius: 8px; padding: 8px 12px;
        }
        .detail-cell-label { color: #64748b; font-size: 10px; letter-spacing: 1px; margin-bottom: 3px; }
        .detail-cell-value { font-family: 'Share Tech Mono', monospace; font-size: 13px; }
        .detail-actions {
            grid-column: 1 / -1;
            display: flex; gap: 8px; align-items: center;
        }
        .neon-button {
            background: transparent;
            border: 1px solid #00f9ff;
            color: #00f9ff;
            padding: 5px 14px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 11px;
            letter-spacing: 1px;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.15s;
            text-transform: uppercase;
        }
        .neon-button:hover {
            background: #00f9ff; color: #050507;
            box-shadow: 0 0 16px #00f9ff;
        }
        .neon-button.pink {
            border-color: #ff00aa; color: #ff00aa;
        }
        .neon-button.pink:hover {
            background: #ff00aa; color: #fff;
            box-shadow: 0 0 16px #ff00aa;
        }

        /* no-results */
        #no-results {
            padding: 60px 20px; text-align: center;
        }
        #no-results i { font-size: 48px; color: #334155; margin-bottom: 16px; }
        #no-results p { color: #64748b; }

        /* ── Loading overlay ── */
        .loading-overlay {
            position: fixed; inset: 0;
            background: #050507;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 999; gap: 16px;
        }
        .loading-overlay.hidden { display: none; }
        .load-bar { width: 220px; height: 3px; background: #111118; border: 1px solid #334155; border-radius: 2px; overflow: hidden; }
        .load-bar-fill { height: 100%; background: #00f9ff; box-shadow: 0 0 8px #00f9ff; animation: load-pulse 1.4s ease-in-out infinite; }
        @keyframes load-pulse { 0%{width:0%} 50%{width:70%} 100%{width:100%} }

        /* ── Toast ── */
        .toast {
            position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
            background: #00f9ff; color: #050507;
            padding: 8px 20px; border-radius: 999px;
            font-size: 12px; font-weight: 600;
            display: flex; align-items: center; gap: 8px;
            box-shadow: 0 0 20px rgba(0,249,255,0.5);
            z-index: 200;
            transition: all 0.3s ease;
        }

        /* mobile: sidebar is 36px rail by default, opens as overlay */
        @media (max-width: 600px) {
            #sidebar {
                width: 36px !important;
            }
            /* Hide filter content completely when rail is collapsed */
            #sidebar:not(.mobile-open) #sidebar-inner {
                display: none !important;
            }
            #sidebar.mobile-open {
                width: 260px !important;
                position: absolute;
                top: 0; bottom: 0; left: 0;
                z-index: 40;
                box-shadow: 8px 0 24px rgba(0,0,0,0.75);
            }
            #sidebar.mobile-open #sidebar-inner {
                display: block !important;
            }
            #sidebar-backdrop {
                display: none;
                position: absolute;
                top: 0; right: 0; bottom: 0; left: 0;
                background: rgba(0,0,0,0.55);
                z-index: 39;
            }
            #sidebar-backdrop.show { display: block; }
        }
    </style>
</head>
<body>

    <!-- Loading overlay -->
    <div class="loading-overlay" id="loading-overlay">
        <div style="font-family:'Orbitron',sans-serif;font-weight:700;font-size:22px;letter-spacing:3px;text-shadow:0 0 10px #00f9ff,0 0 20px #00f9ff;">NEON FORGE</div>
        <div style="font-size:11px;color:#00f9ff;letter-spacing:2px;">LOADING DATABASE...</div>
        <div class="load-bar"><div class="load-bar-fill"></div></div>
        <div style="font-size:10px;color:#64748b;" id="load-status">Fetching db.sqlite</div>
    </div>

    <!-- ── HEADER ── -->
    <header id="app-header">
        <div class="header-logo">
            <div class="header-logo-icon">
                <i class="fa-solid fa-microchip" style="color:#050507;font-size:18px;"></i>
            </div>
            <div>
                <div class="header-title">NEON FORGE</div>
                <div class="header-sub">CNC TOOL ARCHIVE v2.4</div>
            </div>
        </div>

        <div class="header-stats">
            <div class="stat-pill hidden sm:flex">
                <div style="width:7px;height:7px;background:#39ff14;border-radius:50%;animation:load-pulse 2s infinite;"></div>
                <span style="color:#94a3b8;" id="stat-insert-count">—</span>
            </div>
            <div class="stat-pill hidden sm:flex" id="stat-brand-count" style="color:#94a3b8;">—</div>
            <div class="unit-toggle">
                <button onclick="setUnit('metric')" id="btn-metric" class="active">MM</button>
                <button onclick="setUnit('imperial')" id="btn-imperial">IN</button>
            </div>
        </div>

        <div id="header-resize-handle"></div>
    </header>

    <!-- ── BODY ── -->
    <div id="app-body">

        <!-- Mobile-only backdrop behind the filter overlay -->
        <div id="sidebar-backdrop" onclick="closeSidebarMobile()"></div>

        <!-- ── SIDEBAR ── -->
        <div id="sidebar">
            <!-- collapse toggle -->
            <div id="sidebar-toggle" title="Toggle filters" onclick="toggleSidebar()">
                <i class="fa-solid fa-sliders" id="sidebar-toggle-icon" style="font-size:13px;"></i>
            </div>

            <div id="sidebar-inner">
                <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;padding:0 2px;">
                    <div style="font-size:10px;letter-spacing:2px;color:#00f9ff;font-weight:600;">FILTERS</div>
                    <button onclick="clearAllFilters()" style="font-size:10px;color:#ff00aa;background:none;border:none;cursor:pointer;display:flex;align-items:center;gap:4px;font-family:'Share Tech Mono',monospace;">
                        <i class="fa-solid fa-times"></i> CLEAR
                    </button>
                </div>

                <div style="display:flex;flex-direction:column;gap:14px;">
                    <div>
                        <div class="filter-group-title"><i class="fa-solid fa-industry" style="width:12px;"></i> MANUFACTURER</div>
                        <div style="display:flex;flex-wrap:wrap;gap:4px;" id="filter-manufacturer"></div>
                    </div>
                    <div>
                        <div class="filter-group-title"><i class="fa-solid fa-cogs" style="width:12px;"></i> TYPE</div>
                        <div style="display:flex;flex-wrap:wrap;gap:4px;" id="filter-type"></div>
                    </div>
                    <div>
                        <div class="filter-group-title"><i class="fa-solid fa-shapes" style="width:12px;"></i> SHAPE</div>
                        <div style="display:flex;flex-wrap:wrap;gap:4px;" id="filter-shape"></div>
                    </div>
                    <div>
                        <div class="filter-group-title"><i class="fa-solid fa-medal" style="width:12px;"></i> GRADE</div>
                        <div style="display:flex;flex-wrap:wrap;gap:4px;" id="filter-grade"></div>
                    </div>
                    <div>
                        <div class="filter-group-title"><i class="fa-solid fa-wave-square" style="width:12px;"></i> CHIPBREAKER</div>
                        <div style="display:flex;flex-wrap:wrap;gap:4px;" id="filter-cb"></div>
                    </div>
                </div>

                <div style="margin-top:20px;font-size:10px;color:#334155;padding:0 2px;">
                    <i class="fa-solid fa-info-circle" style="margin-right:4px;"></i>
                    Data from db.sqlite
                </div>
            </div>

            <div id="sidebar-resize-handle"></div>
        </div>

        <!-- ── MAIN CONTENT ── -->
        <div id="main-content">
            <!-- Search bar -->
            <div id="search-bar">
                <div class="search-wrap">
                    <i class="fa-solid fa-search"></i>
                    <input type="text" id="search-input" placeholder="SEARCH PART # OR DESCRIPTION...">
                </div>
                <div class="results-count">
                    <span id="results-count">0</span> found
                </div>
            </div>

            <!-- Table -->
            <div id="table-wrap">
                <table id="tool-table">
                    <thead>
                        <tr>
                            <th style="width:140px;">PART #</th>
                            <th style="width:72px;">TYPE</th>
                            <th style="width:80px;">MAKER</th>
                            <th>DESCRIPTION</th>
                            <th class="center" style="width:120px;">SIZE</th>
                            <th class="center" style="width:64px;">GRADE</th>
                            <th class="center" style="width:54px;">SHAPE</th>
                            <th class="center" style="width:48px;">CB</th>
                            <th class="center" style="width:70px;">CORNER R</th>
                            <th style="width:72px;"></th>
                        </tr>
                    </thead>
                    <tbody id="table-body"></tbody>
                </table>
                <div id="no-results" class="hidden">
                    <i class="fa-solid fa-search"></i>
                    <p>No tools match your filters</p>
                    <button onclick="clearAllFilters()" class="neon-button" style="margin-top:12px;">CLEAR FILTERS</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.3/sql-wasm.min.js"></script>
    <script>
    // ── State ─────────────────────────────────────────────────────────────────
    let tools = []
    let activeFilters = { maker:[], type:[], shape:[], grade:[], cb:[] }
    let currentUnit = 'metric'
    let openDetailRow = null  // currently expanded row id

    // ── Persist header/sidebar sizes ──────────────────────────────────────────
    const PREFS_KEY = 'nf_prefs'
    function loadPrefs() {
        try { return JSON.parse(localStorage.getItem(PREFS_KEY)) || {} } catch { return {} }
    }
    function savePrefs(p) {
        const existing = loadPrefs()
        localStorage.setItem(PREFS_KEY, JSON.stringify({...existing, ...p}))
    }
    function applyPrefs() {
        const p = loadPrefs()
        if (p.headerH) document.documentElement.style.setProperty('--header-h', p.headerH + 'px')
        if (p.sidebarW) document.documentElement.style.setProperty('--sidebar-w', p.sidebarW + 'px')
        if (p.sidebarCollapsed) {
            document.getElementById('sidebar').classList.add('collapsed')
        }
        if (p.unit) { currentUnit = p.unit }
    }

    // ── Normalization maps ────────────────────────────────────────────────────
    const MAKER_MAP = {
        'Horn': 'PH Horn'
    }
    const SHAPE_MAP = {
        // 35° Diamond
        '35 deg Diamond':        '35° Diamond',
        '35 deg Diamond (VBMT)': '35° Diamond',
        'V':                     '35° Diamond',
        'V (35° Diamond)':       '35° Diamond',
        'V (35° Rhombic)':       '35° Diamond',
        'V (35°) VBGT positive': '35° Diamond',
        'V (35°) VBMT positive': '35° Diamond',
        // 55° Diamond
        '55 deg Diamond':        '55° Diamond',
        'D':                     '55° Diamond',
        'D (55° Diamond)':       '55° Diamond',
        'D (55° Rhombic)':       '55° Diamond',
        // 80° Diamond
        '80 deg Diamond':        '80° Diamond',
        '80° Diamond':           '80° Diamond',
        'C':                     '80° Diamond',
        'C (80° Diamond)':       '80° Diamond',
        'C (80° Rhombic)':       '80° Diamond',
        // 60° Triangle
        'T':                     '60° Triangle',
        'T (60° Triangle)':      '60° Triangle',
        'Triangle':              '60° Triangle',
    }
    function normalizeTool(t) {
        if (t.maker && MAKER_MAP[t.maker]) t.maker = MAKER_MAP[t.maker]
        if (t.shape && SHAPE_MAP[t.shape]) t.shape = SHAPE_MAP[t.shape]
        return t
    }

    // ── Unit ──────────────────────────────────────────────────────────────────
    function formatDim(v) {
        if (v == null || v === '') return '—'
        const n = parseFloat(v)
        if (isNaN(n)) return '—'
        return currentUnit === 'imperial' ? `${(n * 0.0393701).toFixed(3)}"` : `${n} mm`
    }
    function buildSize(t) {
        const u = currentUnit === 'imperial' ? '"' : 'mm'
        const c = v => currentUnit === 'imperial' ? (v * 0.0393701).toFixed(3) : v.toFixed(2)
        if (t.ic_mm != null && t.s_mm != null) return `IC ${c(t.ic_mm)}${u} · S ${c(t.s_mm)}${u}`
        if (t.ic_mm != null) return `IC ${c(t.ic_mm)}${u}`
        return t.fallbackSize || ''
    }
    function setUnit(unit) {
        currentUnit = unit
        document.getElementById('btn-metric').classList.toggle('active', unit === 'metric')
        document.getElementById('btn-imperial').classList.toggle('active', unit === 'imperial')
        savePrefs({unit})
        applyFilters()
    }

    // ── Filters ───────────────────────────────────────────────────────────────
    function getUnique(key) {
        const s = new Set()
        tools.forEach(t => { if (t[key]) s.add(t[key]) })
        return Array.from(s).sort()
    }
    function renderFilters() {
        const map = { maker:'filter-manufacturer', type:'filter-type', shape:'filter-shape', grade:'filter-grade', cb:'filter-cb' }
        Object.entries(map).forEach(([key, id]) => {
            const el = document.getElementById(id)
            el.innerHTML = ''
            getUnique(key).forEach(v => {
                const chip = document.createElement('div')
                chip.className = 'filter-chip'
                chip.textContent = v
                chip.onclick = () => {
                    const active = activeFilters[key].includes(v)
                    if (active) {
                        activeFilters[key] = activeFilters[key].filter(x => x !== v)
                        chip.classList.remove('active')
                    } else {
                        activeFilters[key].push(v)
                        chip.classList.add('active')
                    }
                    applyFilters()
                }
                el.appendChild(chip)
            })
        })
    }
    function clearAllFilters() {
        activeFilters = { maker:[], type:[], shape:[], grade:[], cb:[] }
        document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'))
        document.getElementById('search-input').value = ''
        applyFilters()
    }

    // ── Filter logic ──────────────────────────────────────────────────────────
    function applyFilters() {
        const q = document.getElementById('search-input').value.toLowerCase().trim()
        let filtered = tools.filter(t => {
            if (q) {
                const s = `${t.part} ${t.description} ${t.maker} ${t.grade} ${t.shape} ${t.cb}`.toLowerCase()
                if (!s.includes(q)) return false
            }
            if (activeFilters.maker.length  && !activeFilters.maker.includes(t.maker))  return false
            if (activeFilters.type.length   && !activeFilters.type.includes(t.type))    return false
            if (activeFilters.shape.length  && !activeFilters.shape.includes(t.shape))  return false
            if (activeFilters.grade.length  && !activeFilters.grade.includes(t.grade))  return false
            if (activeFilters.cb.length     && !activeFilters.cb.includes(t.cb))        return false
            return true
        })
        document.getElementById('results-count').textContent = filtered.length.toLocaleString()
        renderTable(filtered)
    }

    // ── Type badge class ──────────────────────────────────────────────────────
    function typeCls(type) {
        const map = { insert:'type-insert', holder:'type-holder', module:'type-module', shank:'type-shank', machine:'type-machine' }
        return map[type] || 'type-default'
    }

    // ── Table render ──────────────────────────────────────────────────────────
    function renderTable(data) {
        const tbody = document.getElementById('table-body')
        tbody.innerHTML = ''
        const noResults = document.getElementById('no-results')

        if (data.length === 0) {
            noResults.classList.remove('hidden')
            return
        }
        noResults.classList.add('hidden')
        openDetailRow = null

        data.forEach(t => {
            // Main row
            const tr = document.createElement('tr')
            tr.dataset.id = t.id
            tr.innerHTML = `
                <td class="td-part">${t.part}</td>
                <td><span class="type-badge ${typeCls(t.type)}">${t.type}</span></td>
                <td class="td-maker"><span>${t.maker}</span></td>
                <td class="td-desc">${t.description ? t.description.substring(0,100)+(t.description.length>100?'…':'') : '—'}</td>
                <td class="center" style="font-family:'Share Tech Mono',monospace;white-space:nowrap;">${buildSize(t) || '—'}</td>
                <td class="center td-grade">${t.grade || '—'}</td>
                <td class="center" style="font-family:'Share Tech Mono',monospace;">${t.shape || '—'}</td>
                <td class="center" style="font-family:'Share Tech Mono',monospace;">${t.cb || '—'}</td>
                <td class="center" style="font-family:'Share Tech Mono',monospace;">${t.cornerRadius != null ? formatDim(t.cornerRadius) : '—'}</td>
                <td style="text-align:right;padding-right:10px;">
                    <button class="btn-details" onclick="toggleDetail(${t.id}, this)">DETAILS</button>
                </td>
            `
            tbody.appendChild(tr)

            // Hidden detail row
            const dr = document.createElement('tr')
            dr.className = 'detail-row'
            dr.id = `detail-${t.id}`
            dr.style.display = 'none'
            const colspan = 10
            dr.innerHTML = `<td colspan="${colspan}">
                <div class="detail-panel">
                    <div class="detail-panel-wide">${t.description || '—'}</div>
                    ${buildSize(t) ? `<div class="detail-cell"><div class="detail-cell-label">SIZE</div><div class="detail-cell-value">${buildSize(t)}</div></div>` : ''}
                    ${t.grade ? `<div class="detail-cell"><div class="detail-cell-label">GRADE</div><div class="detail-cell-value" style="color:#39ff14;">${t.grade}</div></div>` : ''}
                    ${t.shape ? `<div class="detail-cell"><div class="detail-cell-label">SHAPE</div><div class="detail-cell-value">${t.shape}</div></div>` : ''}
                    ${t.cb ? `<div class="detail-cell"><div class="detail-cell-label">CHIPBREAKER</div><div class="detail-cell-value">${t.cb}</div></div>` : ''}
                    ${t.cornerRadius != null ? `<div class="detail-cell"><div class="detail-cell-label">CORNER RADIUS</div><div class="detail-cell-value">${formatDim(t.cornerRadius)}</div></div>` : ''}
                    ${t.minBore != null ? `<div class="detail-cell"><div class="detail-cell-label">MIN BORE</div><div class="detail-cell-value">${formatDim(t.minBore)}</div></div>` : ''}
                    ${t.mountsTo ? `<div class="detail-cell"><div class="detail-cell-label">MOUNTS TO</div><div class="detail-cell-value" style="color:#a98ff5;">${t.mountsTo}</div></div>` : ''}
                    <div class="detail-actions">
                        <button class="neon-button" onclick="copyPart('${t.part}')">COPY PART #</button>
                    </div>
                </div>
            </td>`
            tbody.appendChild(dr)
        })
    }

    // ── Toggle detail row ─────────────────────────────────────────────────────
    function toggleDetail(id, btn) {
        const dr = document.getElementById(`detail-${id}`)
        if (!dr) return

        const isOpen = dr.style.display !== 'none'

        // Close any open one first
        if (openDetailRow && openDetailRow !== id) {
            const prev = document.getElementById(`detail-${openDetailRow}`)
            if (prev) prev.style.display = 'none'
            const prevBtn = document.querySelector(`tr[data-id="${openDetailRow}"] .btn-details`)
            if (prevBtn) prevBtn.classList.remove('open')
        }

        if (isOpen) {
            dr.style.display = 'none'
            btn.classList.remove('open')
            openDetailRow = null
        } else {
            dr.style.display = ''
            btn.classList.add('open')
            openDetailRow = id
        }
    }

    // ── Copy part # ───────────────────────────────────────────────────────────
    function copyPart(part) {
        navigator.clipboard.writeText(part).then(() => {
            const t = document.createElement('div')
            t.className = 'toast'
            t.innerHTML = `<i class="fa-solid fa-check"></i> Copied ${part}`
            document.body.appendChild(t)
            setTimeout(() => {
                t.style.opacity = '0'
                t.style.transform = 'translate(-50%, 16px)'
                setTimeout(() => t.remove(), 300)
            }, 1800)
        })
    }

    // ── Sidebar toggle ────────────────────────────────────────────────────────
    function toggleSidebar() {
        const sb = document.getElementById('sidebar')
        const bd = document.getElementById('sidebar-backdrop')
        if (window.matchMedia('(max-width: 600px)').matches) {
            const open = sb.classList.toggle('mobile-open')
            if (bd) bd.classList.toggle('show', open)
        } else {
            const collapsed = sb.classList.toggle('collapsed')
            savePrefs({ sidebarCollapsed: collapsed })
        }
    }

    function closeSidebarMobile() {
        const sb = document.getElementById('sidebar')
        const bd = document.getElementById('sidebar-backdrop')
        sb.classList.remove('mobile-open')
        if (bd) bd.classList.remove('show')
    }

    // ── HUD stats ─────────────────────────────────────────────────────────────
    function updateHUD() {
        const makers = new Set(tools.map(t => t.maker).filter(Boolean))
        const inserts = tools.filter(t => t.type === 'insert').length
        const si = document.getElementById('stat-insert-count')
        const sb = document.getElementById('stat-brand-count')
        if (si) si.textContent = `${inserts.toLocaleString()} inserts`
        if (sb) sb.textContent = `${makers.size} brands`
    }

    // ── Header resize ─────────────────────────────────────────────────────────
    (function() {
        const handle = document.getElementById('header-resize-handle')
        const header = document.getElementById('app-header')
        let dragging = false, startY, startH

        handle.addEventListener('mousedown', e => {
            dragging = true
            startY = e.clientY
            startH = header.offsetHeight
            handle.classList.add('dragging')
            document.body.style.cursor = 'ns-resize'
            e.preventDefault()
        })
        document.addEventListener('mousemove', e => {
            if (!dragging) return
            const h = Math.max(40, Math.min(120, startH + (e.clientY - startY)))
            document.documentElement.style.setProperty('--header-h', h + 'px')
            savePrefs({ headerH: h })
        })
        document.addEventListener('mouseup', () => {
            if (!dragging) return
            dragging = false
            handle.classList.remove('dragging')
            document.body.style.cursor = ''
        })

        // Touch support
        handle.addEventListener('touchstart', e => {
            dragging = true
            startY = e.touches[0].clientY
            startH = header.offsetHeight
            e.preventDefault()
        }, {passive: false})
        document.addEventListener('touchmove', e => {
            if (!dragging) return
            const h = Math.max(40, Math.min(120, startH + (e.touches[0].clientY - startY)))
            document.documentElement.style.setProperty('--header-h', h + 'px')
            savePrefs({ headerH: h })
        })
        document.addEventListener('touchend', () => { dragging = false })
    }());

    // ── Sidebar resize ────────────────────────────────────────────────────────
    ;(function() {
        const handle = document.getElementById('sidebar-resize-handle')
        const sidebar = document.getElementById('sidebar')
        let dragging = false, startX, startW

        handle.addEventListener('mousedown', e => {
            dragging = true
            startX = e.clientX
            startW = sidebar.offsetWidth
            handle.classList.add('dragging')
            document.body.style.cursor = 'ew-resize'
            e.preventDefault()
        })
        document.addEventListener('mousemove', e => {
            if (!dragging) return
            const w = Math.max(140, Math.min(420, startW + (e.clientX - startX)))
            sidebar.style.width = w + 'px'
            document.documentElement.style.setProperty('--sidebar-w', w + 'px')
            savePrefs({ sidebarW: w })
        })
        document.addEventListener('mouseup', () => {
            if (!dragging) return
            dragging = false
            handle.classList.remove('dragging')
            document.body.style.cursor = ''
        })

        // Touch support
        handle.addEventListener('touchstart', e => {
            dragging = true
            startX = e.touches[0].clientX
            startW = sidebar.offsetWidth
            e.preventDefault()
        }, {passive: false})
        document.addEventListener('touchmove', e => {
            if (!dragging) return
            const w = Math.max(140, Math.min(420, startW + (e.touches[0].clientX - startX)))
            sidebar.style.width = w + 'px'
            document.documentElement.style.setProperty('--sidebar-w', w + 'px')
            savePrefs({ sidebarW: w })
        })
        document.addEventListener('touchend', () => { dragging = false })
    })()

    // ── DB load ───────────────────────────────────────────────────────────────
    async function loadDB() {
        const status = document.getElementById('load-status')
        try {
            if (status) status.textContent = 'Fetching db.sqlite...'
            const resp = await fetch('db.sqlite')
            if (!resp.ok) throw new Error(`HTTP ${resp.status}`)

            if (status) status.textContent = 'Parsing...'
            const buf = await resp.arrayBuffer()
            const SQL = await initSqlJs({ locateFile: f => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.3/${f}` })
            const db = new SQL.Database(new Uint8Array(buf))

            const res = db.exec('SELECT * FROM tools ORDER BY component_type, manufacturer, json_id')
            if (!res.length) throw new Error('tools table empty')
            const { columns, values } = res[0]

            tools = values.map((row, idx) => {
                const obj = {}
                columns.forEach((c, i) => {
                    let v = row[i]
                    if (v && ['specs','compatible_machines','compatible_inserts','sources','tags'].includes(c)) {
                        try { v = JSON.parse(v) } catch {}
                    }
                    obj[c] = v
                })
                const sp = (obj.specs && typeof obj.specs === 'object') ? obj.specs : {}
                const re = parseFloat(sp.re_mm ?? sp.corner_radius_RE ?? sp.corner_radius_mm ?? sp.corner_radius ?? 0) || null
                const bore = parseFloat(sp.min_bore_diameter ?? sp.minimum_bore_diameter ?? sp.bore_diameter_min ?? 0) || null
                const ic_mm = sp.ic_mm != null ? parseFloat(sp.ic_mm) : null
                const s_mm  = sp.s_mm  != null ? parseFloat(sp.s_mm)  : null
                let mountsTo = null
                if (Array.isArray(obj.compatible_machines) && obj.compatible_machines.length) mountsTo = obj.compatible_machines[0]
                else if (Array.isArray(obj.compatible_inserts) && obj.compatible_inserts.length) mountsTo = obj.compatible_inserts[0]
                return normalizeTool({
                    id: idx+1,
                    part: obj.json_id || '',
                    type: obj.component_type || '',
                    maker: obj.manufacturer || '',
                    description: obj.description || '',
                    ic_mm, s_mm,
                    fallbackSize: obj.size || '',
                    grade: obj.grade || '',
                    shape: obj.shape || '',
                    cb: obj.chipbreaker || '',
                    cornerRadius: re,
                    minBore: bore,
                    mountsTo
                })
            })
            db.close()
            initialize()
        } catch(e) {
            document.getElementById('loading-overlay').classList.add('hidden')
            document.getElementById('results-count').innerHTML = `<span style="color:#ff00aa">DB ERR: ${e.message}</span>`
            console.error('[NEON FORGE]', e)
        }
    }

    function initialize() {
        document.getElementById('loading-overlay').classList.add('hidden')
        applyPrefs()
        renderFilters()
        updateHUD()
        document.getElementById('results-count').textContent = tools.length.toLocaleString()
        renderTable(tools)

        document.getElementById('search-input').addEventListener('input', applyFilters)
        document.addEventListener('keydown', e => {
            if (e.key === 'Escape') {
                document.getElementById('search-input').value = ''
                clearAllFilters()
            }
            if (e.key === '/' && document.activeElement.tagName === 'BODY') {
                e.preventDefault()
                document.getElementById('search-input').focus()
            }
        })

        // Set unit button state from saved pref
        const p = loadPrefs()
        if (p.unit === 'imperial') setUnit('imperial')
        else setUnit('metric')
    }

    window.onload = loadDB
    window.NEON_TOOLS = () => tools

    // ── Tweaks ────────────────────────────────────────────────────────────────
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "headerH": 76,
      "searchBarH": 38,
      "fontSize": 12
    }/*EDITMODE-END*/;

    function applyTweaks(t) {
        document.documentElement.style.setProperty('--header-h', t.headerH + 'px')
        document.documentElement.style.setProperty('--search-bar-h', t.searchBarH + 'px')
        document.documentElement.style.setProperty('--ui-font-size', t.fontSize + 'px')
        // sync sliders
        const sh = document.getElementById('tw-headerH')
        const ss = document.getElementById('tw-searchH')
        const sf = document.getElementById('tw-fontSize')
        if (sh) { sh.value = t.headerH; document.getElementById('tw-headerH-val').textContent = t.headerH + 'px' }
        if (ss) { ss.value = t.searchBarH; document.getElementById('tw-searchH-val').textContent = t.searchBarH + 'px' }
        if (sf) { sf.value = t.fontSize; document.getElementById('tw-fontSize-val').textContent = t.fontSize + 'px' }
    }

    // load saved tweaks or use defaults
    let activeTweaks = Object.assign({}, TWEAK_DEFAULTS)
    try {
        const saved = JSON.parse(localStorage.getItem('nf_tweaks') || '{}')
        Object.assign(activeTweaks, saved)
    } catch {}
    applyTweaks(activeTweaks)

    function saveTweaks() {
        localStorage.setItem('nf_tweaks', JSON.stringify(activeTweaks))
        window.parent.postMessage({ type: '__edit_mode_set_keys', edits: activeTweaks }, '*')
    }

    // build tweaks panel (hidden by default)
    const tweakPanel = document.createElement('div')
    tweakPanel.id = 'tweaks-panel'
    tweakPanel.style.cssText = `
        display:none; position:fixed; bottom:20px; right:20px; z-index:300;
        background:#0d0d14; border:1px solid #00f9ff;
        box-shadow:0 0 24px rgba(0,249,255,0.3);
        border-radius:12px; padding:16px 18px; width:220px;
        font-family:'Share Tech Mono',monospace; font-size:11px; color:#e0e0ff;
    `
    tweakPanel.innerHTML = `
        <div style="font-family:'Orbitron',sans-serif;font-size:11px;letter-spacing:2px;color:#00f9ff;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;">
            TWEAKS
            <span style="font-size:9px;color:#334155;letter-spacing:1px;">LIVE EDIT</span>
        </div>
        <div style="display:flex;flex-direction:column;gap:12px;">
            <div>
                <div style="display:flex;justify-content:space-between;margin-bottom:4px;color:#94a3b8;letter-spacing:1px;">
                    HEADER HEIGHT <span id="tw-headerH-val">${activeTweaks.headerH}px</span>
                </div>
                <input id="tw-headerH" type="range" min="36" max="120" step="2" value="${activeTweaks.headerH}" style="width:100%;accent-color:#00f9ff;cursor:pointer;">
            </div>
            <div>
                <div style="display:flex;justify-content:space-between;margin-bottom:4px;color:#94a3b8;letter-spacing:1px;">
                    SEARCH BAR <span id="tw-searchH-val">${activeTweaks.searchBarH}px</span>
                </div>
                <input id="tw-searchH" type="range" min="28" max="64" step="2" value="${activeTweaks.searchBarH}" style="width:100%;accent-color:#00f9ff;cursor:pointer;">
            </div>
            <div>
                <div style="display:flex;justify-content:space-between;margin-bottom:4px;color:#94a3b8;letter-spacing:1px;">
                    FONT SIZE <span id="tw-fontSize-val">${activeTweaks.fontSize}px</span>
                </div>
                <input id="tw-fontSize" type="range" min="9" max="18" step="1" value="${activeTweaks.fontSize}" style="width:100%;accent-color:#00f9ff;cursor:pointer;">
            </div>
        </div>
        <button onclick="activeTweaks=Object.assign({},TWEAK_DEFAULTS);applyTweaks(activeTweaks);saveTweaks();"
            style="margin-top:14px;width:100%;background:transparent;border:1px solid #334155;color:#64748b;
            padding:5px;border-radius:6px;font-family:'Share Tech Mono',monospace;font-size:10px;
            letter-spacing:1px;cursor:pointer;transition:all 0.15s;"
            onmouseover="this.style.borderColor='#ff00aa';this.style.color='#ff00aa'"
            onmouseout="this.style.borderColor='#334155';this.style.color='#64748b'">
            RESET DEFAULTS
        </button>
    `
    document.body.appendChild(tweakPanel)

    // wire sliders
    document.getElementById('tw-headerH').addEventListener('input', function() {
        activeTweaks.headerH = +this.value
        applyTweaks(activeTweaks); saveTweaks()
    })
    document.getElementById('tw-searchH').addEventListener('input', function() {
        activeTweaks.searchBarH = +this.value
        applyTweaks(activeTweaks); saveTweaks()
    })
    document.getElementById('tw-fontSize').addEventListener('input', function() {
        activeTweaks.fontSize = +this.value
        applyTweaks(activeTweaks); saveTweaks()
    })

    // host toggle protocol — register listener FIRST
    window.addEventListener('message', e => {
        if (e.data?.type === '__activate_edit_mode')   tweakPanel.style.display = 'block'
        if (e.data?.type === '__deactivate_edit_mode') tweakPanel.style.display = 'none'
    })
    window.parent.postMessage({ type: '__edit_mode_available' }, '*')
    </script>
</body>
</html>
